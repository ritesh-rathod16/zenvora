name: zenvora
description: "Zenvora - Anonymous Social Platform for GenZ."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10
  lottie: ^3.1.2
  confetti: ^0.7.0
  percent_indicator: ^4.2.3
  flutter_card_swiper: ^7.0.0
  shimmer: ^3.0.0
  flutter_blurhash: ^0.8.2

  # Networking
  http: ^1.2.1
  socket_io_client: ^2.0.3+1
  web_socket_channel: ^3.0.1

  # Supabase
  supabase_flutter: ^2.5.6

  # Audio
  just_audio: ^0.9.38
  record: ^6.0.0
  path_provider: ^2.1.3

  # Permissions
  permission_handler: ^11.3.1

  # Unique IDs
  uuid: ^4.4.0

  # State management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # WebRTC (video/audio chat)
  flutter_webrtc: ^0.12.12
  livekit_client: ^2.1.5

  # Routing
  go_router: ^14.2.0

  # Utilities
  intl: ^0.19.0
  fl_chart: ^0.68.0
  network_info_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
